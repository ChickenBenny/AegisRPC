services:
  aegis-rpc:
    build: .
    ports:
      - "8545:8545"
    environment:
      AEGIS_PORT: "8545"
      AEGIS_UPSTREAMS: "https://eth.llamarpc.com"
      AEGIS_MUTABLE_TTL: "12s"
      AEGIS_HEALTH_INTERVAL: "15s"
      AEGIS_PROBE_TIMEOUT: "5s"
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8545"
      prometheus.io/path: "/metrics"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.3.1
    profiles: [monitoring]
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # DEV ONLY — grants broad host access. Remove for production;
      # use a static scrape target in prometheus.yml instead.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9090:9090"
    depends_on:
      - aegis-rpc
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.1
    profiles: [monitoring]
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # Optional shared cache for multi-replica deployments. Enable with:
  #   docker compose --profile ha up -d
  # The aegis-rpc container needs AEGIS_CACHE_BACKEND=redis and AEGIS_REDIS_URL
  # to point here; see README for the recommended ha override file.
  redis:
    image: redis:7.4-alpine
    profiles: [ha]
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    restart: unless-stopped
