apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Monitoring overlay — extends base and adds the Prometheus Operator
# ServiceMonitor. Requires kube-prometheus-stack (or any Prometheus Operator
# installation) to be present in the target cluster.
#
# Apply with:
#   kubectl apply -k deploy/k8s/overlays/monitoring/
#
# If your Prometheus Operator Helm release is not named "prometheus", override
# the label so the ServiceMonitor is picked up:
#   commonLabels:
#     release: <your-prometheus-operator-release-name>
resources:
  - ../../base
  - servicemonitor.yaml
