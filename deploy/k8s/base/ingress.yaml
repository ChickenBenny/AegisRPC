apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegis-rpc
  namespace: aegis-rpc
  labels:
    app.kubernetes.io/name: aegis-rpc
  annotations:
    # Allow large RPC batch request bodies (default nginx limit is 1m).
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    # WebSocket support: prevent the ingress from timing out long-lived
    # ws:// connections before the client or server closes them.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # HTTP/1.1 is required for WebSocket upgrade; the NGINX Ingress controller
    # automatically forwards the Upgrade/Connection headers when this is set,
    # so no configuration-snippet is needed (and configuration-snippet is
    # disabled by default in NGINX Ingress >= 1.9 for security reasons).
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  rules:
    # TODO: replace with your actual domain before deploying.
    - host: aegis-rpc.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aegis-rpc
                port:
                  name: http
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: aegis-rpc
                port:
                  name: http
