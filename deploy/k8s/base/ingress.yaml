apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegis-rpc
  namespace: aegis-rpc
  labels:
    app.kubernetes.io/name: aegis-rpc
  annotations:
    # Allow large RPC batch request bodies (default nginx limit is 1m).
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    # WebSocket support: prevent the ingress from timing out long-lived
    # ws:// connections before the client or server closes them.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  rules:
    # TODO: replace with your actual domain before deploying.
    - host: aegis-rpc.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aegis-rpc
                port:
                  name: http
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: aegis-rpc
                port:
                  name: http
