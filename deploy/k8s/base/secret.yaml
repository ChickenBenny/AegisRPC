apiVersion: v1
kind: Secret
metadata:
  name: aegis-rpc-upstreams
  namespace: aegis-rpc
  labels:
    app.kubernetes.io/name: aegis-rpc
type: Opaque
stringData:
  # EXAMPLE — replace with your actual Ethereum JSON-RPC endpoint.
  # This value may contain an API key, which is why it lives in a Secret
  # rather than the ConfigMap.
  #
  # To create this secret imperatively (without committing the value):
  #   kubectl create secret generic aegis-rpc-upstreams \
  #     --from-literal=AEGIS_UPSTREAMS=https://your-endpoint \
  #     -n aegis-rpc
  AEGIS_UPSTREAMS: "https://eth.llamarpc.com"
