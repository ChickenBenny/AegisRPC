apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base resources — no Prometheus Operator dependency.
# Suitable for any Kubernetes cluster.
# Prometheus scraping is handled via pod annotations in deployment.yaml.
resources:
  - namespace.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
