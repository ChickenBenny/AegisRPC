# ServiceMonitor for the Prometheus Operator (kube-prometheus-stack).
# If you are running vanilla Prometheus, delete this file and rely on the
# prometheus.io/* pod annotations in deployment.yaml instead.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: aegis-rpc
  namespace: aegis-rpc
  labels:
    app.kubernetes.io/name: aegis-rpc
    # This label must match the Prometheus Operator's serviceMonitorSelector.
    # The default kube-prometheus-stack value is release: prometheus.
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis-rpc
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
