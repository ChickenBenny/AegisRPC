apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-rpc
  namespace: aegis-rpc
  labels:
    app.kubernetes.io/name: aegis-rpc
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis-rpc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegis-rpc
      # Annotations for Prometheus annotation-based scraping.
      # Used by vanilla Prometheus with kubernetes_sd_configs / pod role.
      # If you use the Prometheus Operator, rely on ServiceMonitor instead.
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8545"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: aegis-rpc
          image: ghcr.io/chickenbenny/aegis-rpc:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8545
              protocol: TCP
          envFrom:
            - configMapRef:
                name: aegis-rpc-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 5
